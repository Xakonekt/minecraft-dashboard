name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de déclencher manuellement depuis GitHub

jobs:
  # ─────────────────────────────────────────
  # 1. Vérifier qu'aucun joueur n'est en ligne
  # ─────────────────────────────────────────
  check-players:
    name: Check players online
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
      count: ${{ steps.check.outputs.count }}

    steps:
      - name: Query agent API
        id: check
        run: |
          HTTP=$(curl -s -o /tmp/players.json -w "%{http_code}" \
            --max-time 10 \
            "${{ secrets.AGENT_URL }}/api/players" || echo "000")

          if [ "$HTTP" != "200" ]; then
            echo "::error::Impossible de joindre l'agent (HTTP $HTTP). Déploiement annulé."
            exit 1
          fi

          ONLINE=$(jq -r '.online // 0' /tmp/players.json)
          echo "count=$ONLINE" >> $GITHUB_OUTPUT

          if [ "$ONLINE" -gt "0" ]; then
            echo "can_deploy=false" >> $GITHUB_OUTPUT
          else
            echo "can_deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Abort — players online
        if: steps.check.outputs.can_deploy == 'false'
        run: |
          echo "::error::${{ steps.check.outputs.count }} joueur(s) en ligne. Déploiement annulé."
          exit 1

  # ─────────────────────────────────────────
  # 2a. Déployer l'agent (VM Minecraft)
  # ─────────────────────────────────────────
  deploy-agent:
    name: Deploy Agent
    needs: check-players
    runs-on: ubuntu-latest

    steps:
      - name: SSH → pull & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AGENT_HOST }}
          username: ${{ secrets.AGENT_USER }}
          key: ${{ secrets.AGENT_SSH_KEY }}
          script: |
            set -e
            cd ~/minecraft-dashboard/agent
            git pull origin main
            npm install --omit=dev
            pm2 restart minecraft-agent
            echo "✅ Agent déployé"

  # ─────────────────────────────────────────
  # 2b. Déployer le frontend (VM Dashboard)
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: check-players
    runs-on: ubuntu-latest

    steps:
      - name: SSH → pull, build & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ${{ secrets.FRONTEND_USER }}
          key: ${{ secrets.FRONTEND_SSH_KEY }}
          script: |
            set -e
            cd ~/minecraft-dashboard/frontend
            git pull origin main
            npm ci
            npm run build
            pm2 restart minecraft-dashboard
            echo "✅ Frontend déployé"
