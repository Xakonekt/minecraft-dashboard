name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de déclencher manuellement depuis GitHub

jobs:
  # ─────────────────────────────────────────
  # 1. Vérifier joueurs + déployer l'agent
  #    (check en local sur la VM via SSH)
  # ─────────────────────────────────────────
  deploy-agent:
    name: Check players & Deploy Agent
    runs-on: [self-hosted, agent]

    steps:
      - name: Check players online
        run: |
          HTTP=$(curl -s -o /tmp/players.json -w "%{http_code}" \
            --max-time 10 http://localhost:3001/api/players || echo "000")

          # 000 = agent injoignable (pas démarré)
          if [ "$HTTP" == "000" ]; then
            echo "❌ Agent injoignable — est-il démarré ?"
            exit 1
          fi

          # Retourne le total de joueurs sur TOUS les serveurs configurés
          ONLINE=$(jq -r '.online // 0' /tmp/players.json 2>/dev/null || echo "0")

          if [ "$ONLINE" -gt "0" ]; then
            echo "❌ $ONLINE joueur(s) en ligne — déploiement annulé"
            exit 1
          fi

          echo "✅ Tous les serveurs vides — déploiement en cours"

      - name: Pull & restart agent
        run: |
          cd ~/minecraft-dashboard/agent
          git pull origin main
          npm install --omit=dev
          pm2 restart minecraft-agent
          echo "✅ Agent déployé"

  # ─────────────────────────────────────────
  # 2. Déployer le frontend (VM Dashboard)
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-agent
    runs-on: [self-hosted, frontend]

    steps:
      - name: Pull, build & restart
        run: |
          cd ~/minecraft-dashboard/frontend
          git reset --hard HEAD
          git pull origin main
          npm ci
          npm run build
          pm2 restart minecraft-dashboard
          echo "✅ Frontend déployé"
