name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de déclencher manuellement depuis GitHub

jobs:
  # ─────────────────────────────────────────
  # 1. Vérifier joueurs + déployer l'agent
  #    (check en local sur la VM via SSH)
  # ─────────────────────────────────────────
  deploy-agent:
    name: Check players & Deploy Agent
    runs-on: ubuntu-latest

    steps:
      - name: SSH → check players, pull & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AGENT_HOST }}
          username: ${{ secrets.AGENT_USER }}
          key: ${{ secrets.AGENT_SSH_KEY }}
          script: |
            set -e

            # Vérifier les joueurs en ligne via l'API locale
            HTTP=$(curl -s -o /tmp/players.json -w "%{http_code}" \
              --max-time 10 http://localhost:3001/api/players || echo "000")

            if [ "$HTTP" != "200" ]; then
              echo "❌ Agent injoignable (HTTP $HTTP)"
              exit 1
            fi

            ONLINE=$(jq -r '.online // 0' /tmp/players.json)

            if [ "$ONLINE" -gt "0" ]; then
              echo "❌ $ONLINE joueur(s) en ligne — déploiement annulé"
              exit 1
            fi

            echo "✅ Serveur vide ($ONLINE joueurs) — déploiement en cours"
            cd ~/minecraft-dashboard/agent
            git pull origin main
            npm install --omit=dev
            pm2 restart minecraft-agent
            echo "✅ Agent déployé"

  # ─────────────────────────────────────────
  # 2. Déployer le frontend (VM Dashboard)
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-agent
    runs-on: ubuntu-latest

    steps:
      - name: SSH → pull, build & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ${{ secrets.FRONTEND_USER }}
          key: ${{ secrets.FRONTEND_SSH_KEY }}
          script: |
            set -e
            cd ~/minecraft-dashboard/frontend
            git pull origin main
            npm ci
            npm run build
            pm2 restart minecraft-dashboard
            echo "✅ Frontend déployé"
